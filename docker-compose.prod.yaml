services:
  db:
    image: ghcr.io/${GHCR_OWNER:-nasus20202}/realestate-db:${TAG:-latest}
    environment:
      POSTGRES_USER: realestate
      POSTGRES_PASSWORD: realestate
      POSTGRES_DB: realestate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realestate"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${GHCR_OWNER:-nasus20202}/realestate-api:${TAG:-latest}
    environment:
      DATABASE_URL: postgresql+asyncpg://realestate:realestate@db:5432/realestate
      EMBEDDING_DIM: "${EMBEDDING_DIM:-2048}"
      API_ROOT_PATH: /api
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-*}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://openrouter.ai/api/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_EMBEDDING_MODEL: "${LLM_EMBEDDING_MODEL:-}"
      SCHEDULER_ENABLED: "${SCHEDULER_ENABLED:-false}"
      SCHEDULER_DEFAULT_INTERVAL_MINUTES: "${SCHEDULER_DEFAULT_INTERVAL_MINUTES:-360}"
    env_file:
      - path: backend/.env
        required: false
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/${GHCR_OWNER:-nasus20202}/realestate-web:${TAG:-latest}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
