services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: realestate
      POSTGRES_PASSWORD: realestate
      POSTGRES_DB: realestate
    ports:
      - "5432:5432"
    volumes:
      # pg18 convention: mount at /var/lib/postgresql (data lands in a versioned subdir).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realestate"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Inside the compose network the DB host is "db", not localhost.
      DATABASE_URL: postgresql+asyncpg://realestate:realestate@db:5432/realestate
      EMBEDDING_DIM: "${EMBEDDING_DIM:-1536}"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-*}"
      # LLM is optional — without a key/model the app degrades to rule-based ranking.
      # Provide these via a local .env file (auto-loaded by docker compose) or your shell.
      LLM_BASE_URL: "${LLM_BASE_URL:-https://openrouter.ai/api/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_EMBEDDING_MODEL: "${LLM_EMBEDDING_MODEL:-}"
      SCHEDULER_ENABLED: "${SCHEDULER_ENABLED:-false}"
      SCHEDULER_DEFAULT_INTERVAL_MINUTES: "${SCHEDULER_DEFAULT_INTERVAL_MINUTES:-360}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle; the browser reaches the API on the host port.
        VITE_API_BASE: "${VITE_API_BASE:-http://localhost:8000}"
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
