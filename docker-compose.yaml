services:
  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    environment:
      POSTGRES_USER: realestate
      POSTGRES_PASSWORD: realestate
      POSTGRES_DB: realestate
    ports:
      - "5432:5432"
    volumes:
      # pg18 convention: mount at /var/lib/postgresql (data lands in a versioned subdir).
      - pgdata:/var/lib/postgresql
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://realestate:realestate@db:5432/realestate
      API_ROOT_PATH: /api
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-*}"
      SCHEDULER_ENABLED: "${SCHEDULER_ENABLED:-false}"
      SCHEDULER_DEFAULT_INTERVAL_MINUTES: "${SCHEDULER_DEFAULT_INTERVAL_MINUTES:-360}"
    env_file:
      - path: backend/.env
        required: false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
